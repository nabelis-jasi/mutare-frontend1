<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutare Sewer Engineering Dashboard</title>
    <link rel="icon" href="data:,">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Heatmap Plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.0.1/leaflet-heat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- jsPDF for reports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard">
    <!-- LEFT PANEL - Layer List and Filters -->
    <div class="left-panel">
        <div id="header-container"></div>
        <!-- Layer List (checkboxes for manholes, pipelines, etc.) -->
        <div id="layermanager-container"></div>
        <!-- Filters (accordion style) -->
        <div id="filters-container"></div>
    </div>
    
    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- Toolbar with Menu Icon as first button -->
        <div id="toolbar-container"></div>
        
        <!-- Map Container -->
        <div id="map-container" class="map-container" style="flex: 1; position: relative; background: #0a1f0a;">
            <div id="map" style="height: 100%; width: 100%;"></div>
        </div>
        
        <!-- Status Bar -->
        <div id="status-container"></div>
    </div>
    
    <!-- RIGHT PANEL - Statistics, Hotspots, Reports -->
    <div class="right-panel">
        <div id="statistics-container"></div>
        <div id="hotspots-container"></div>
        <div id="reports-container"></div>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
