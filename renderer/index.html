<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutare Sewer Asset Manager</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../plugins/leaflet.heat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      color: forestgreen;
      font-family: 'Segoe UI', 'Monaco', monospace;
    }
    body {
      background-color: #0a1f0a;
      padding: 20px;
    }
    /* Wizard overlay */
    #wizard {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .wizard-card {
      background: #1e3a1e;
      padding: 30px;
      border-radius: 12px;
      border: 2px solid forestgreen;
      width: 400px;
      box-shadow: 0 0 20px forestgreen;
    }
    .wizard-card h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    .wizard-card input {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      background: #0a1f0a;
      border: 1px solid forestgreen;
      border-radius: 6px;
    }
    .wizard-card button {
      width: 100%;
      padding: 10px;
      background: forestgreen;
      color: black;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    /* Main app */
    #app {
      display: none;
    }
    .toolbar {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    button, .sync-btn {
      background-color: #1e3a1e;
      border: 1px solid forestgreen;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    button:hover, .sync-btn:hover {
      background-color: forestgreen;
      color: black;
    }
    .tabs {
      display: flex;
      gap: 5px;
      border-bottom: 1px solid forestgreen;
      margin-bottom: 15px;
    }
    .tab {
      padding: 8px 20px;
      cursor: pointer;
      background: #1e3a1e;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
    }
    .tab.active {
      background: forestgreen;
      color: black;
      border-bottom: 2px solid #0a1f0a;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    #map {
      height: 500px;
      border-radius: 12px;
      border: 2px solid forestgreen;
      background: #1e3a1e;
    }
    .profile-sidebar {
      margin-top: 20px;
      background: #1e3a1e;
      border: 1px solid forestgreen;
      border-radius: 12px;
      padding: 15px;
    }
    .profile-sidebar h3 {
      border-bottom: 1px solid forestgreen;
      margin-bottom: 10px;
    }
    .status {
      font-size: 0.9em;
      margin-left: 20px;
      color: #80c080;
    }
    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.8em;
      color: #3c6e3c;
    }
  </style>
</head>
<body>

<!-- First-run connection wizard -->
<div id="wizard" style="display: none;">
  <div class="wizard-card">
    <h2>🔌 PostgreSQL Connection</h2>
    <input type="text" id="pg-host" placeholder="Host (e.g., localhost)" value="localhost">
    <input type="text" id="pg-port" placeholder="Port" value="5432">
    <input type="text" id="pg-user" placeholder="Username">
    <input type="password" id="pg-password" placeholder="Password">
    <input type="text" id="pg-db" placeholder="Database name">
    <button id="save-creds">Save & Connect</button>
  </div>
</div>

<!-- Main Application -->
<div id="app">
  <div class="toolbar">
    <button id="sync-btn">🔄 Sync Offline Logs</button>
    <button id="pdf-report-btn">📄 Generate Weekly PDF Report</button>
    <span id="sync-status" class="status">✅ Synced</span>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="map-tab">🗺️ Heatmap</div>
    <div class="tab" data-tab="reports-tab">📊 Reports</div>
  </div>
  <div id="map-tab" class="tab-content active">
    <div id="map"></div>
    <div id="asset-profile" class="profile-sidebar">
      <h3>Asset Profile</h3>
      <p>Click on a manhole or pipe marker to see details</p>
    </div>
  </div>
  <div id="reports-tab" class="tab-content">
    <h3>Weekly Maintenance Summary</h3>
    <div id="report-preview" style="background:#1e3a1e; padding:15px; border-radius:12px;">
      <p>Click "Generate Weekly PDF Report" above to create an official council PDF.</p>
    </div>
  </div>
  <footer>Mutare City Council - Asset Management System | Forest Green Edition</footer>
</div>

<script>
  // ----- IPC Helpers (assumes preload exposes these) -----
  const { electronAPI } = window;
  // Expected: electronAPI.saveCredentials, getCredentials, query, syncNow, queueLog, getAssetProfile

  // Global state
  let map;
  let heatLayer;
  let markersLayer;
  let currentCredentials = null;

  // Helper: show/hide wizard
  async function checkFirstRun() {
    const creds = await electronAPI.getCredentials();
    if (!creds) {
      document.getElementById('wizard').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    } else {
      document.getElementById('wizard').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      currentCredentials = creds;
      initApp();
    }
  }

  // Save credentials handler
  document.getElementById('save-creds')?.addEventListener('click', async () => {
    const creds = {
      host: document.getElementById('pg-host').value,
      port: document.getElementById('pg-port').value,
      user: document.getElementById('pg-user').value,
      password: document.getElementById('pg-password').value,
      database: document.getElementById('pg-db').value
    };
    try {
      await electronAPI.saveCredentials(creds);
      checkFirstRun();
    } catch (err) {
      alert('Connection failed: ' + err.message);
    }
  });

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const targetId = tab.dataset.tab;
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById(targetId).classList.add('active');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (targetId === 'map-tab' && map) map.invalidateSize();
    });
  });

  // Initialize map and heatmap
  async function initMap() {
    if (map) map.remove();
    map = L.map('map').setView([-18.9735, 32.6705], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB'
    }).addTo(map);

    // Fetch heatmap data from PostgreSQL
    const hotspots = await electronAPI.query(`
      SELECT latitude, longitude, COUNT(*) as intensity
      FROM job_logs
      WHERE date > NOW() - INTERVAL '30 days'
      GROUP BY latitude, longitude
    `);
    const heatPoints = hotspots.map(row => [row.latitude, row.longitude, row.intensity]);
    if (heatLayer) map.removeLayer(heatLayer);
    heatLayer = L.heatLayer(heatPoints, { radius: 25, blur: 15, maxZoom: 17 });
    heatLayer.addTo(map);

    // Optional: add markers for each manhole with click to show asset profile
    const manholes = await electronAPI.query(`SELECT DISTINCT manhole_id, latitude, longitude FROM job_logs`);
    if (markersLayer) map.removeLayer(markersLayer);
    markersLayer = L.layerGroup().addTo(map);
    manholes.forEach(mh => {
      const marker = L.circleMarker([mh.latitude, mh.longitude], { radius: 5, color: 'forestgreen', fillOpacity: 0.7 });
      marker.bindPopup(`Manhole ${mh.manhole_id}`);
      marker.on('click', async () => {
        // Show asset profile (you need a pipes table, but we fake with manhole_id)
        const profile = await electronAPI.getAssetProfile(mh.manhole_id);
        document.getElementById('asset-profile').innerHTML = `
          <h3>Asset: Manhole ${profile.asset.id}</h3>
          <p><strong>Installed:</strong> ${profile.asset.installation_date || 'Unknown'}</p>
          <p><strong>Material:</strong> ${profile.asset.material || 'Cast Iron'}</p>
          <p><strong>Risk Score:</strong> <span style="color: ${profile.risk > 70 ? '#ff6666' : '#80ff80'}">${profile.risk.toFixed(1)}%</span></p>
          <h4>Maintenance History</h4>
          <ul>${profile.logs.map(log => `<li>${new Date(log.date).toLocaleDateString()}: ${log.action || 'Cleared blockage'}</li>`).join('') || '<li>No logs</li>'}</ul>
        `;
      });
      marker.addTo(markersLayer);
    });
  }

  // PDF Report Generation (using jspdf)
  async function generatePDFReport() {
    const jobs = await electronAPI.query(`
      SELECT manhole_id, resolution_time, date
      FROM job_logs
      WHERE date >= NOW() - INTERVAL '7 days'
      ORDER BY date DESC
    `);
    if (!jobs.length) {
      alert('No jobs in the last 7 days.');
      return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    // Logo (base64 or local path – you can load an image)
    // For simplicity we add text logo
    doc.setFontSize(20);
    doc.setTextColor(34, 139, 34); // forestgreen
    doc.text('🏛️ Mutare City Council', 20, 20);
    doc.setFontSize(12);
    doc.text('Weekly Maintenance Report', 20, 30);
    doc.setFontSize(10);
    doc.text(`Generated: ${new Date().toLocaleString()}`, 20, 40);
    
    doc.autoTable({
      startY: 50,
      head: [['Manhole ID', 'Resolution (hours)', 'Date']],
      body: jobs.map(j => [j.manhole_id, j.resolution_time, new Date(j.date).toLocaleDateString()]),
      theme: 'striped',
      headStyles: { fillColor: [34, 139, 34], textColor: [255,255,255] },
      bodyStyles: { textColor: [34,139,34] },
      alternateRowStyles: { fillColor: [240,255,240] }
    });
    const totalJobs = jobs.length;
    const avgTime = jobs.reduce((a,b) => a + b.resolution_time, 0) / totalJobs;
    const finalY = doc.lastAutoTable.finalY + 10;
    doc.text(`Total blockages cleared: ${totalJobs}`, 20, finalY);
    doc.text(`Average resolution time: ${avgTime.toFixed(1)} hours`, 20, finalY + 10);
    doc.save(`Weekly_Report_${new Date().toISOString().slice(0,10)}.pdf`);
  }

  // Sync offline logs to PostgreSQL
  async function syncOfflineLogs() {
    const statusSpan = document.getElementById('sync-status');
    statusSpan.textContent = '🔄 Syncing...';
    statusSpan.style.color = 'orange';
    try {
      await electronAPI.syncNow();
      statusSpan.textContent = '✅ Synced';
      statusSpan.style.color = 'forestgreen';
      // Refresh map data after sync
      if (document.querySelector('.tab.active').dataset.tab === 'map-tab') initMap();
    } catch (err) {
      statusSpan.textContent = '❌ Sync failed';
      statusSpan.style.color = 'red';
      console.error(err);
    }
  }

  // Main init after credentials exist
  async function initApp() {
    initMap();
    // Attach button handlers
    document.getElementById('sync-btn').onclick = syncOfflineLogs;
    document.getElementById('pdf-report-btn').onclick = generatePDFReport;
    // Optional: periodically check sync status
  }

  // Start the app
  checkFirstRun();
</script>
</body>
</html>
