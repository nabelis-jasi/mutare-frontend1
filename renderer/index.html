<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutare Sewer Asset Manager</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.0.1/leaflet-heat.js"></script>
  <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wizard" style="display: none;">
  <div class="wizard-card">
    <h2>🔌 PostgreSQL Connection</h2>
    <input type="text" id="pg-host" placeholder="Host" value="localhost">
    <input type="text" id="pg-port" placeholder="Port" value="5432">
    <input type="text" id="pg-user" placeholder="Username">
    <input type="password" id="pg-password" placeholder="Password">
    <input type="text" id="pg-db" placeholder="Database name">
    <button id="save-creds">Save & Connect</button>
  </div>
</div>

<div id="app" style="display: none;">
  <div class="toolbar">
    <button id="sync-btn">🔄 Sync Offline Logs</button>
    <button id="pdf-report-btn">📄 Generate Weekly PDF Report</button>
    <span id="sync-status" class="status">✅ Synced</span>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="map-tab">🗺️ Heatmap</div>
    <div class="tab" data-tab="layers-tab">🗂️ Layers</div>
    <div class="tab" data-tab="reports-tab">📊 Reports</div>
  </div>
  
  <!-- Map tab -->
  <div id="map-tab" class="tab-content active">
    <div id="map"></div>
    <div id="asset-profile" class="profile-sidebar">
      <h3>Asset Profile</h3>
      <p>Click on a marker to see details</p>
    </div>
  </div>
  
  <!-- Layers tab (QGIS‑like) -->
  <div id="layers-tab" class="tab-content">
    <div style="display: flex; gap: 20px;">
      <div style="flex: 1; background: #1e3a1e; border-radius: 8px; padding: 10px;">
        <h3>📦 PostGIS Layers</h3>
        <button id="refresh-layers-btn" style="margin-bottom: 10px;">⟳ Refresh</button>
        <div id="available-layers-list" style="max-height: 400px; overflow-y: auto;"></div>
      </div>
      <div style="flex: 1; background: #1e3a1e; border-radius: 8px; padding: 10px;">
        <h3>🗺️ Active Layers</h3>
        <div id="active-layers-list"></div>
      </div>
    </div>
  </div>
  
  <!-- Reports tab -->
  <div id="reports-tab" class="tab-content">
    <h3>Weekly Maintenance Summary</h3>
    <div id="report-preview" style="background:#1e3a1e; padding:15px; border-radius:12px;">
      <p>Use the button above to generate a PDF report.</p>
    </div>
  </div>
  
  <footer>Mutare City Council - Asset Management System | Forest Green Edition</footer>
</div>
<script src="renderer.js"></script>
</body>
</html>
